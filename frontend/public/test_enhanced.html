<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Analytics Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        pre {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 3px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Enhanced Analytics & Semantic Search Test</h1>
    
    <div class="test-section info">
        <h3>Test Instructions</h3>
        <p>1. First upload data using the main app or test upload page</p>
        <p>2. Then test enhanced analytics and semantic search below</p>
        <button onclick="testDataUpload()">Test Data Upload</button>
        <button onclick="testEnhancedAnalytics()">Test Enhanced Analytics</button>
        <button onclick="testSemanticSearch()">Test Semantic Search</button>
    </div>

    <div id="results"></div>

    <script>
        async function testDataUpload() {
            showResults('Testing data upload...', 'info');
            
            try {
                const response = await fetch('http://localhost:8000/debug-columns');
                const data = await response.json();
                
                if (response.ok) {
                    showResults(
                        `Data is loaded!<br>
                        Columns: ${data.columns.join(', ')}<br>
                        Shape: ${data.shape}<br>
                        <strong>Enhanced Analytics should work!</strong>`, 
                        'success'
                    );
                } else {
                    showResults('No data loaded. Please upload data first.', 'error');
                }
            } catch (error) {
                showResults(`Error: ${error.message}`, 'error');
            }
        }

        async function testEnhancedAnalytics() {
            showResults('Testing Enhanced Analytics endpoints...', 'info');
            
            const endpoints = [
                'product-performance',
                'city-performance', 
                'sales-trend-analysis',
                'price-distribution',
                'quantity-vs-sales'
            ];
            
            let results = '<h3>Enhanced Analytics Test Results:</h3>';
            let allSuccess = true;
            
            for (const endpoint of endpoints) {
                try {
                    const response = await fetch(`http://localhost:8000/${endpoint}`);
                    const data = await response.json();
                    
                    if (response.ok) {
                        results += `<div class="success">✅ ${endpoint}: Working</div>`;
                    } else {
                        results += `<div class="error">❌ ${endpoint}: Failed - ${data.detail || 'Unknown error'}</div>`;
                        allSuccess = false;
                    }
                } catch (error) {
                    results += `<div class="error">❌ ${endpoint}: Error - ${error.message}</div>`;
                    allSuccess = false;
                }
            }
            
            if (allSuccess) {
                results += '<div class="success"><strong>🎉 All Enhanced Analytics endpoints are working!</strong></div>';
                results += '<p>Now check <a href="http://localhost:3000/enhanced" target="_blank">http://localhost:3000/enhanced</a></p>';
            }
            
            showResults(results, allSuccess ? 'success' : 'error');
        }

        async function testSemanticSearch() {
            showResults('Testing Semantic Search...', 'info');
            
            const queries = ['laptop', 'mouse', 'electronics'];
            let results = '<h3>Semantic Search Test Results:</h3>';
            let allSuccess = true;
            
            for (const query of queries) {
                try {
                    const formData = new FormData();
                    formData.append('query', query);
                    formData.append('top_k', '3');
                    
                    const response = await fetch('http://localhost:8000/semantic-search', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        const searchResults = data.results || [];
                        results += `<div class="success">✅ Query "${query}": Found ${searchResults.length} results</div>`;
                        
                        searchResults.forEach((result, i) => {
                            results += `<div style="margin-left: 20px; font-size: 0.9em;">`;
                            results += `${i+1}. ${result.product_name} - $${result.total_sales} - Similarity: ${result.similarity_score}</div>`;
                        });
                    } else {
                        results += `<div class="error">❌ Query "${query}": Failed - ${data.detail || 'Unknown error'}</div>`;
                        allSuccess = false;
                    }
                } catch (error) {
                    results += `<div class="error">❌ Query "${query}": Error - ${error.message}</div>`;
                    allSuccess = false;
                }
            }
            
            if (allSuccess) {
                results += '<div class="success"><strong>🎉 Semantic Search is working!</strong></div>';
                results += '<p>Now check <a href="http://localhost:3000/search" target="_blank">http://localhost:3000/search</a></p>';
            }
            
            showResults(results, allSuccess ? 'success' : 'error');
        }

        function showResults(message, type) {
            const results = document.getElementById('results');
            results.innerHTML = `<div class="test-section ${type}">${message}</div>`;
        }

        // Test on page load
        window.onload = function() {
            testDataUpload();
        };
    </script>
</body>
</html>
